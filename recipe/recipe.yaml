schema_version: 1

context:
  version: "4.3.1"

package:
  name: pyosmium
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/osmium/osmium-${{ version }}.tar.gz
  sha256: 5cc16af5f0f34d5e67c678433f6ddda6e37f086ab3cf4ac3b15725fd878f75a8

build:
  number: 0

  python:
    entry_points:
      - pyosmium-get-changes = osmium.tools.pyosmium_get_changes:main
      - pyosmium-up-to-date = osmium.tools.pyosmium_up_to_date:main

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - if: unix
      then: make
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}

  host:
    - python
    - scikit-build-core >=0.10
    - pybind11 >=2.9
    - pip
    - libosmium
    - protozero
    - lz4-c
    - zlib
    - expat
    - bzip2
  run:
    - python
    - requests

tests:
  - python:
      imports:
        - osmium
      pip_check: true
  - requirements:
      run:
        - pip
        - python
    script:
      - pyosmium-get-changes --help
      - pyosmium-up-to-date --help

about:
  summary: Python bindings for libosmium, the data processing library for OSM data
  license: BSD-2-Clause
  license_file: LICENSE.TXT
  homepage: https://osmcode.org/pyosmium
  repository: https://github.com/osmcode/pyosmium
  documentation: https://docs.osmcode.org/pyosmium/latest/

extra:
  recipe-maintainers:
    - travishathaway
